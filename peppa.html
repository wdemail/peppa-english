<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐷 小猪佩奇28天打卡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #FFF5E6;
      min-height: 100vh;
      padding: 20px;
    }

    .wrap {
      max-width: 440px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 4px 20px rgba(213, 159, 96, 0.15);
      margin-bottom: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .day-badge {
      display: inline-block;
      background: #FF8A65;
      color: white;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
    }

    .week-badge {
      font-size: 12px;
      color: #999;
    }

    .ep-title {
      font-size: 20px;
      font-weight: 700;
      color: #333;
      margin-bottom: 4px;
    }

    .ep-sub {
      font-size: 14px;
      color: #999;
      margin-bottom: 16px;
    }

    .section {
      background: #FFF9F4;
      border-radius: 14px;
      padding: 14px 16px;
      text-align: left;
      margin-bottom: 10px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section-label {
      font-size: 12px;
      color: #FF8A65;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sentence-en {
      font-size: 17px;
      color: #333;
      line-height: 1.6;
    }

    .sentence-cn {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }

    .usage-list {
      list-style: none;
      font-size: 14px;
      color: #555;
      line-height: 1.8;
    }

    .usage-list li::before {
      content: "💬 ";
    }

    .date-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .progress-wrap {
      background: #FFF5E6;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .progress-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #EEE;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF8A65, #FFB74D);
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .prev-next {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .nav-btn {
      flex: 1;
      padding: 16px 20px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .nav-btn:active { transform: scale(0.96); }
    .nav-prev { background: #F0F0F0; color: #666; }
    .nav-next { background: #FF8A65; color: white; }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #CCC;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<div class="wrap" id="app">
  <!-- content rendered by JS -->
</div>

<script>

  { day: 27, date: "4月22日", week: "第4周", weekday: "周六", ep: "自选",   title: "复习自选",            titleCn: "挑最喜欢的1-2集",  sentence: "复习前26天最熟练的5个句子！",          sentenceCn: "",                            usage: ["和家人用英语交流今天学的内容"] },
  { day: 28, date: "4月23日", week: "第4周", weekday: "周日", ep: "🎉完成", title: "打卡完成！",          titleCn: "28天圆满结束",     sentence: "能听懂简单指令 + 会说简单句子 + 愿意开口！🎉", sentenceCn: "", usage: ["和家人分享学习心得"] },

function getTodayIndex() {
  const start = new Date('2026-03-27');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
  return Math.max(0, Math.min(diff, 27));
}

let current = getTodayIndex();

function render(i) {
  const d = schedule[i];
  const weekNum = Math.ceil(d.day / 7);
  const dayInWeek = ((d.day - 1) % 7) + 1;
  const pct = Math.round((d.day / 28) * 100);
  const usageItems = d.usage.map(u => `<li>${u}</li>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="header">
        <span class="day-badge">第${d.day}天</span>
        <span class="week-badge">${d.date} · ${d.weekday}</span>
      </div>
      <div class="ep-title">${d.ep} ${d.title}</div>
      <div class="ep-sub">${d.titleCn}</div>

      <div class="section">
        <div class="section-label">📝 核心句型</div>
        <div class="sentence-en">${d.sentence}</div>
        ${d.sentenceCn ? `<div class="sentence-cn">${d.sentenceCn}</div>` : ''}
      </div>

      <div class="section">
        <div class="section-label">🗣️ 日常运用</div>
        <ul class="usage-list">${usageItems}</ul>
      </div>
    </div>

    <div class="card">
      <div class="progress-wrap">
        <div class="progress-label">
          <span>📅 本周进度</span>
          <span>${d.week} · ${dayInWeek}/7</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
      </div>

      <div class="prev-next">
        <button class="nav-btn nav-prev" onclick="prev()">← 前一天</button>
        <button class="nav-btn nav-next" onclick="next()">第二天 →</button>
      </div>
    </div>

    <div class="footer">🐷 小猪佩奇28天打卡 · 第${i+1}/28天</div>
  `;
}

function prev() { current = Math.max(0, current - 1); render(current); }
function next() { current = Math.min(27, current + 1); render(current); }

render(current);
</script>
</body>
</html>
